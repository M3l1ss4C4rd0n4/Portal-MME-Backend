# HTTP Server
server {
    listen 80;
    listen [::]:80;
    server_name portalenergetico.minenergia.gov.co www.portalenergetico.minenergia.gov.co 172.17.0.46 localhost;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;
    client_max_body_size 50M;
    
    # API REST
    # WhatsApp Bot API
    location /whatsapp/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Endpoints internos — solo localhost (bot, Celery)
    location /api/v1/internal {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Dashboard
    location / {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
    }
    
    location ~* ^/_dash- {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portalenergetico.minenergia.gov.co www.portalenergetico.minenergia.gov.co 172.17.0.46 localhost;
    ssl_certificate /etc/ssl/certs/portalenergetico.crt;
    ssl_certificate_key /etc/ssl/private/portalenergetico.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    proxy_read_timeout 300s;
    client_max_body_size 50M;

    # HSTS — fuerza HTTPS en navegadores por 1 año
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # API REST
    # WhatsApp Bot API
    location /whatsapp/ {
