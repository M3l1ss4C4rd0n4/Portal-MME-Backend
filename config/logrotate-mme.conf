# Configuración de rotación de logs para MME Server
# Ubicar en: /etc/logrotate.d/mme-server
# Aplicar con: sudo logrotate -f /etc/logrotate.d/mme-server

/home/admonctrlxm/server/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 admonctrlxm admonctrlxm
    size 50M
}

/home/admonctrlxm/server/logs/celery/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 admonctrlxm admonctrlxm
    size 50M
}
