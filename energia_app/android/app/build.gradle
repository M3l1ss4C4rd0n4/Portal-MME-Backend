// android/app/build.gradle
apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"   // Firebase

android {
    namespace "co.gov.minminas.energia"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "co.gov.minminas.energia"
        minSdk        rootProject.ext.minSdkVersion
        targetSdk     rootProject.ext.targetSdkVersion
        versionCode   1
        versionName   "1.0.0"
    }

    signingConfigs {
        release {
            storeFile     file("release.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias      System.getenv("KEY_ALIAS") ?: "energia"
            keyPassword   System.getenv("KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
        }
        release {
            minifyEnabled   true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")

    // Firebase (BoM gestiona versiones automáticamente)
    implementation platform("com.google.firebase:firebase-bom:33.1.0")
    implementation "com.google.firebase:firebase-messaging"
    implementation "com.google.firebase:firebase-analytics"

    // Porcupine wake word  ← REMOVIDO (reemplazado por STT nativo)
    // implementation "ai.picovoice:porcupine-android:3.0.2"
}
